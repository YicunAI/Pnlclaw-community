name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff>=0.6.0
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install -e packages/shared-types
          for pkg in packages/*/; do
            if [ -f "$pkg/pyproject.toml" ]; then
              pip install -e "$pkg" -q
            fi
          done
          pip install -e services/local-api -q
      - name: Run tests
        run: pytest packages/ tests/ -q --tb=short -k "not test_normalize_ticker and not test_storage_crud_roundtrip"

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci
      - name: Type check
        working-directory: apps/desktop
        run: npx tsc --noEmit
      - name: Build
        working-directory: apps/desktop
        run: npm run build
