name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  ci-gate:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci-gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            cd /opt/pnlclaw

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Installing Python dependencies ==="
            source /opt/pnlclaw/venv/bin/activate
            pip install -e ".[dev]" -q
            pip install "redis[hiredis]>=5.0.0" -q
            for pkg in packages/*/; do
              if [ -f "$pkg/pyproject.toml" ]; then
                pip install -e "$pkg" -q
              fi
            done

            echo "=== Building frontend ==="
            cd apps/desktop
            # Ensure auth env var persists across deploys
            if [ ! -f .env.production ]; then
              echo 'NEXT_PUBLIC_AUTH_API_URL=https://pnlclaw.com/auth' > .env.production
            fi
            npm ci --prefer-offline
            npm run build
            cd /opt/pnlclaw

            echo "=== Ensuring Redis is installed and running ==="
            if ! command -v redis-server &>/dev/null; then
              echo "Installing Redis..."
              apt-get update -qq && apt-get install -y -qq redis-server
            fi
            systemctl enable redis-server 2>/dev/null || true
            systemctl start redis-server 2>/dev/null || true
            redis-cli ping || echo "WARNING: Redis not responding, K-line cache will be disabled"

            echo "=== Restarting services ==="
            systemctl restart pnlclaw-admin
            systemctl restart pnlclaw-api
            systemctl restart pnlclaw-web

            echo "=== Verifying services ==="
            sleep 3
            systemctl is-active pnlclaw-admin
            systemctl is-active pnlclaw-api
            systemctl is-active pnlclaw-web

            echo "=== Deploy complete ==="
