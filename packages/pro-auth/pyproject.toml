[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pnlclaw-pro-auth"
version = "0.1.0"
description = "Pro authentication: OAuth, JWT, TOTP for PnLClaw"
license = "LicenseRef-Proprietary"
requires-python = ">=3.11"
dependencies = [
    "pnlclaw-types",
    "pnlclaw-core",
    "pnlclaw-pro-storage",
    "authlib>=1.3.0",
    "PyJWT>=2.8.0",
    "httpx>=0.27.0",
    "cryptography>=43.0",
    "pyotp>=2.9.0",
    "qrcode[pil]>=7.4",
]

[project.optional-dependencies]
geoip = ["geoip2>=4.8.0"]
ua = ["ua-parser>=1.0.0"]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21"]

[tool.hatch.build.targets.wheel]
packages = ["pnlclaw_pro_auth"]
