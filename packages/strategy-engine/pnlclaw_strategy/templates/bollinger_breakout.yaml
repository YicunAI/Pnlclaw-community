# Bollinger Breakout Strategy
# Entry: Price crosses above upper Bollinger Band
# Exit: Price crosses below middle Bollinger Band (SMA)

id: template-bollinger-breakout
name: Bollinger Breakout
type: custom
description: >
  Momentum breakout strategy using Bollinger Bands.
  Goes long when close price breaks above the upper band,
  and closes when price drops below the middle band.
symbols:
  - BTC/USDT
interval: 1h
parameters:
  bb_period: 20
  bb_std: 2.0

entry_rules:
  long:
    - indicator: sma
      params:
        period: 1
      operator: crosses_above
      comparator:
        indicator: bbands_upper
        params:
          period: 20

exit_rules:
  close_long:
    - indicator: sma
      params:
        period: 1
      operator: crosses_below
      comparator:
        indicator: bbands_middle
        params:
          period: 20

risk_params:
  stop_loss_pct: 0.02
  take_profit_pct: 0.06
  max_position_pct: 0.1
  max_open_positions: 1
