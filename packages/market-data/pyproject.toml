[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pnlclaw-market"
version = "0.1.0"
description = "Market stream normalization, cache, event bus"
readme = {text = "Market stream normalization, cache, event bus", content-type = "text/plain"}
license = "AGPL-3.0-only"
requires-python = ">=3.11"
dependencies = [
    "pnlclaw-types",
    "pnlclaw-core",
    "pnlclaw-exchange",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

[tool.hatch.build.targets.wheel]
packages = ["pnlclaw_market"]
