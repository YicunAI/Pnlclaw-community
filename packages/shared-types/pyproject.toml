[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pnlclaw-types"
version = "0.1.0"
description = "Unified data models for PnLClaw — crypto quantitative trading platform"
readme = {text = "Unified data models for PnLClaw.", content-type = "text/plain"}
license = "AGPL-3.0-only"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0,<3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

[tool.hatch.build.targets.wheel]
packages = ["pnlclaw_types"]
